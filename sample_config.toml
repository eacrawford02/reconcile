[output]
file = "ledger_dat"
date_format = "%Y-%m-%d %a"
transaction_map = "sample_transaction_map.toml"

[[accounts]]
identifier = "XXXXXXXXXXXXXXX1"
ledger_source = "Assets:Chequing"

date_column = 2
date_format = "%m/%d/%Y"
debit_column = 6
debit_format = "{:.2f}"
credit_column = 6
credit_format = "{:.2f}"
payee_columns = [4, 5]

display_columns = [2, 6, 4, 5]

[[accounts]]
identifier = "XXXXXXXXXXXXXXX2"
ledger_source = "Liabilities:Credit Card"

date_column = 2
date_format = "%Y%m%d"
debit_column = 4
debit_format = "{:.2f}"
credit_column = 4
credit_format = "{:.2f}"
payee_columns = [5]

display_columns = [2, 4, 5]
